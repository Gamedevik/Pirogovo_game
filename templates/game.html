<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хроники Пирогово</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #1a1a1a;
            color: #d4c8a0;
            min-height: 100vh;
            overflow: hidden;
            height: 100vh;
        }
        .top-bar {
            background: #2a2a2a;
            border-bottom: 2px solid #4a3a2a;
            padding: 6px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            flex-shrink: 0;
        }
        .top-bar .title {
            font-size: 16px;
            font-weight: bold;
            color: #c5a83d;
            letter-spacing: 3px;
        }
        .top-bar .user-info {
            font-size: 12px;
            color: #8a8672;
        }
        .main-area {
            display: flex;
            height: calc(100vh - 44px);
        }
        .left-panel {
            width: 160px;
            min-width: 160px;
            background: #1e1e1e;
            border-right: 2px solid #4a3a2a;
            padding: 10px 8px;
            overflow-y: auto;
        }
        .resource-group {
            background: #2d2d2d;
            border: 1px solid #3a3a2a;
            border-radius: 4px;
            padding: 8px 10px;
            margin-bottom: 8px;
        }
        .resource-group .label {
            font-size: 9px;
            text-transform: uppercase;
            color: #8a8672;
            letter-spacing: 1px;
        }
        .resource-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 2px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .resource-item:last-child { border-bottom: none; }
        .resource-item .value { color: #c5a83d; font-weight: bold; }
        .menu-btn {
            background: #2d2d2d;
            border: 1px solid #3a3a2a;
            border-radius: 4px;
            color: #d4c8a0;
            padding: 6px 10px;
            font-size: 11px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 4px;
            text-align: left;
            font-family: inherit;
        }
        .menu-btn:hover { background: #3a3a2a; border-color: #c5a83d; }
        .menu-btn.active { background: #3a3a2a; border-color: #c5a83d; color: #c5a83d; }
        .map-container {
            flex: 1;
            background: #1a2a1a;
            position: relative;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }
        #map:active { cursor: grabbing; }
        .right-panel {
            width: 200px;
            min-width: 200px;
            background: #1e1e1e;
            border-left: 2px solid #4a3a2a;
            padding: 10px;
            overflow-y: auto;
        }
        .info-card {
            background: #2d2d2d;
            border: 1px solid #3a3a2a;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .info-card .title {
            font-size: 11px;
            text-transform: uppercase;
            color: #c5a83d;
            letter-spacing: 1px;
            border-bottom: 1px solid #3a3a2a;
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .info-card .row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 3px 0;
            color: #8a8672;
        }
        .info-card .row .val { color: #d4c8a0; }
        .build-btn {
            background: #4a3a2a;
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            color: #d4c8a0;
            padding: 4px 8px;
            font-size: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 3px;
            font-family: inherit;
        }
        .build-btn:hover { background: #5a4a3a; border-color: #c5a83d; }
        .legend {
            background: #2d2d2d;
            border: 1px solid #3a3a2a;
            border-radius: 4px;
            padding: 6px 8px;
            margin-top: 8px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #8a8672;
            padding: 2px 0;
        }
        .legend-item .color-box {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid #3a3a2a;
            flex-shrink: 0;
        }
        .tooltip {
            position: absolute;
            background: rgba(20,20,20,0.95);
            border: 1px solid #c5a83d;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 12px;
            color: #d4c8a0;
            display: none;
            z-index: 100;
            max-width: 200px;
            pointer-events: none;
        }
        .tooltip .name { color: #c5a83d; font-weight: bold; }
        @media (max-width: 640px) {
            .left-panel { width: 100px; min-width: 100px; }
            .right-panel { display: none; }
            .resource-item { font-size: 10px; }
            .menu-btn { font-size: 9px; padding: 4px 6px; }
        }
        .queue-item {
            font-size: 10px;
            color: #8a8672;
            padding: 2px 0;
            border-bottom: 1px solid #2a2a2a;
        }
        .queue-item .time { color: #c5a83d; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="title">🏰 Хроники Пирогово</div>
    <div class="user-info">👤 <span id="usernameDisplay">{{ user.username }}</span></div>
</div>

<div class="main-area">

    <div class="left-panel">
        <div class="resource-group">
            <div class="label">📦 Ресурсы</div>
            <div class="resource-item"><span>🌲 Древесина</span> <span class="value" id="wood">0</span></div>
            <div class="resource-item"><span>🌾 Еда</span> <span class="value" id="food">0</span></div>
            <div class="resource-item"><span>💰 Золото</span> <span class="value" id="gold">0</span></div>
        </div>
        <button class="menu-btn active" id="btnMap">🗺️ Карта</button>
        <button class="menu-btn" id="btnQueue">⏳ Очередь</button>
        <div class="legend" id="legend"></div>
    </div>

    <div class="map-container">
        <canvas id="map"></canvas>
        <div class="tooltip" id="tooltip">
            <div class="name" id="tooltipName">Название</div>
            <div id="tooltipDesc">Описание</div>
        </div>
    </div>

    <div class="right-panel">
        <div class="info-card" id="territoryInfo">
            <div class="title">📍 Территория</div>
            <div class="row"><span>Название</span><span class="val" id="selectedName">—</span></div>
            <div class="row"><span>Владелец</span><span class="val" id="selectedOwner">—</span></div>
            <div class="row"><span>Население</span><span class="val" id="selectedPop">—</span></div>
            <div class="row"><span>🌲 Дерево</span><span class="val" id="selectedWood">—</span></div>
            <div class="row"><span>💰 Золото</span><span class="val" id="selectedGold">—</span></div>
        </div>
        <div class="info-card" id="buildPanel">
            <div class="title">🏗️ Строительство</div>
            <button class="build-btn" data-type="farm">🌾 Ферма (30🌲 10💰)</button>
            <button class="build-btn" data-type="mine">⛏️ Шахта (40🌲 20💰)</button>
            <button class="build-btn" data-type="sawmill">🪵 Лесопилка (20🌲 5💰)</button>
            <button class="build-btn" data-type="house">🏠 Дом (25🌲 15💰)</button>
        </div>
        <div class="info-card" id="queuePanel">
            <div class="title">⏳ Очередь</div>
            <div id="queueList">Нет заданий</div>
        </div>
    </div>
</div>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    let mapData = [];
    let selectedTerritory = null;
    let scale = 1;
    let offsetX = 0, offsetY = 0;
    let isDragging = false;
    let dragStartX, dragStartY;

    const canvas = document.getElementById('map');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');

    // ===== ЗАГРУЗКА КАРТЫ =====
    async function loadMap() {
        try {
            const res = await fetch('/api/map-data');
            mapData = await res.json();
            drawLegend();
            resizeCanvas();
            updateQueue();
            setInterval(updateQueue, 10000);
        } catch (e) {
            console.error('Ошибка загрузки карты:', e);
        }
    }

    // ===== ОТРИСОВКА КАРТЫ =====
    const BOUNDS = {
        minLat: 56.765,
        maxLat: 56.81,
        minLon: 53.12,
        maxLon: 53.185
    };

    function resizeCanvas() {
        const container = canvas.parentElement;
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        drawMap();
    }

    function latLonToPixel(lat, lon) {
        const x = (lon - BOUNDS.minLon) / (BOUNDS.maxLon - BOUNDS.minLon) * canvas.width * scale + offsetX;
        const y = (BOUNDS.maxLat - lat) / (BOUNDS.maxLat - BOUNDS.minLat) * canvas.height * scale + offsetY;
        return { x, y };
    }

    function drawMap() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#1a2a1a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Сетка
        ctx.strokeStyle = 'rgba(255,255,255,0.03)';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 60 * scale) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, canvas.height);
            ctx.stroke();
        }
        for (let i = 0; i < canvas.height; i += 60 * scale) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(canvas.width, i);
            ctx.stroke();
        }

        mapData.forEach(t => {
            if (!t.center_lat || !t.center_lon) return;
            
            // Рисуем точки как круги (упрощенно)
            const p = latLonToPixel(t.center_lat, t.center_lon);
            
            // Размер зависит от населения
            const radius = Math.min(10 + t.population / 100, 25) * scale;
            
            // Тень
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            
            // Круг
            const gradient = ctx.createRadialGradient(
                p.x - radius * 0.3, p.y - radius * 0.3, 0,
                p.x, p.y, radius
            );
            gradient.addColorStop(0, t.color + 'cc');
            gradient.addColorStop(1, t.color + '88');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            
            // Обводка
            ctx.strokeStyle = t.color;
            ctx.lineWidth = 1.5 * scale;
            ctx.beginPath();
            ctx.arc(p.x, p.y, radius, 0, 2 * Math.PI);
            ctx.stroke();

            // Название
            ctx.fillStyle = '#fff';
            ctx.font = `${Math.max(8, 10 * scale)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.9)';
            ctx.shadowBlur = 4;
            ctx.fillText(t.faction || t.name, p.x, p.y - radius - 8 * scale);
            ctx.shadowBlur = 0;
            
            // Население
            ctx.fillStyle = '#8a8672';
            ctx.font = `${Math.max(7, 8 * scale)}px Arial`;
            ctx.fillText(`👤 ${t.population}`, p.x, p.y + radius + 12 * scale);
        });
    }

    // ===== ЛЕГЕНДА =====
    function drawLegend() {
        const legend = document.getElementById('legend');
        legend.innerHTML = '<div class="legend-item" style="color:#c5a83d;font-weight:bold;">🏴 Фракции</div>';
        const seen = new Set();
        mapData.forEach(t => {
            if (!seen.has(t.faction)) {
                seen.add(t.faction);
                legend.innerHTML += `
                    <div class="legend-item">
                        <span class="color-box" style="background:${t.color};"></span>
                        ${t.faction}
                    </div>
                `;
            }
        });
    }

    // ===== ВЫБОР ТЕРРИТОРИИ =====
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        let found = null;
        let minDist = Infinity;
        
        mapData.forEach(t => {
            if (!t.center_lat || !t.center_lon) return;
            const p = latLonToPixel(t.center_lat, t.center_lon);
            const dist = Math.sqrt((x - p.x) ** 2 + (y - p.y) ** 2);
            const radius = Math.min(10 + t.population / 100, 25) * scale;
            if (dist < radius * 1.5 && dist < minDist) {
                minDist = dist;
                found = t;
            }
        });

        if (found) {
            selectedTerritory = found;
            document.getElementById('selectedName').textContent = found.name || found.faction;
            document.getElementById('selectedOwner').textContent = found.owner_name || 'Нейтральная';
            document.getElementById('selectedPop').textContent = found.population || '—';
            document.getElementById('selectedWood').textContent = found.wood || '—';
            document.getElementById('selectedGold').textContent = found.gold || '—';
            
            // Обновляем ресурсы игрока (пока просто показываем)
            document.getElementById('wood').textContent = found.wood || 0;
            document.getElementById('food').textContent = found.food || 0;
            document.getElementById('gold').textContent = found.gold || 0;
            
            // Показываем тултип
            tooltipName.textContent = found.name || found.faction;
            tooltipDesc.textContent = `👤 ${found.population} чел. | 🌲 ${found.wood || 0} | 💰 ${found.gold || 0}`;
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX + 10) + 'px';
            tooltip.style.top = (e.clientY - 10) + 'px';
            setTimeout(() => tooltip.style.display = 'none', 3000);
        }
    });

    // ===== ЗУМ И ПАН =====
    canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        scale = Math.min(Math.max(scale * delta, 0.5), 3);
        drawMap();
    });

    canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragStartX = e.clientX - offsetX;
        dragStartY = e.clientY - offsetY;
        canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', (e) => {
        if (isDragging) {
            offsetX = e.clientX - dragStartX;
            offsetY = e.clientY - dragStartY;
            drawMap();
        }
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
        canvas.style.cursor = 'grab';
    });

    // ===== СТРОИТЕЛЬСТВО =====
    document.querySelectorAll('.build-btn').forEach(btn => {
        btn.addEventListener('click', async function() {
            if (!selectedTerritory) {
                alert('Сначала выберите территорию на карте!');
                return;
            }
            
            const type = this.dataset.type;
            try {
                const formData = new FormData();
                formData.append('building_type', type);
                
                const res = await fetch(`/api/build/${selectedTerritory.id}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.error) {
                    alert('❌ ' + data.error);
                } else {
                    alert('✅ ' + data.message);
                    loadMap();
                }
            } catch (e) {
                alert('❌ Ошибка соединения');
            }
        });
    });

    // ===== ОЧЕРЕДЬ =====
    async function updateQueue() {
        try {
            const res = await fetch('/api/queue');
            const data = await res.json();
            const list = document.getElementById('queueList');
            
            if (data.length === 0) {
                list.innerHTML = 'Нет заданий';
                return;
            }
            
            list.innerHTML = data.map(q => `
                <div class="queue-item">
                    ${q.action_type} ⏱️ <span class="time">${q.time_left || 0} мин</span>
                </div>
            `).join('');
        } catch (e) {
            console.error('Ошибка очереди:', e);
        }
    }

    // ===== ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК =====
    document.getElementById('btnMap').addEventListener('click', function() {
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelector('.map-container').style.display = 'block';
        document.querySelector('.right-panel').style.display = 'block';
    });

    document.getElementById('btnQueue').addEventListener('click', function() {
        document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        document.querySelector('.map-container').style.display = 'block';
        document.querySelector('.right-panel').style.display = 'block';
        updateQueue();
    });

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    window.addEventListener('resize', resizeCanvas);
    loadMap();

    console.log('🗺️ Хроники Пирогово загружены!');
</script>
</body>
</html>
