<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хроники Пирогово</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1f16;
            color: #e0dcc8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #252b1f;
            border-radius: 20px;
            padding: 30px;
            max-width: 360px;
            width: 100%;
            border: 1px solid #3a4030;
            text-align: center;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #c5a83d;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 { color: #c5a83d; font-size: 24px; margin-bottom: 5px; }
        .role {
            display: inline-block;
            background: #3a4030;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: #8a8672;
            margin-bottom: 20px;
        }
        .info {
            text-align: left;
            background: #1a1f16;
            border-radius: 12px;
            padding: 16px;
            margin: 10px 0;
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #252b1f;
        }
        .info-item:last-child { border-bottom: none; }
        .label { color: #8a8672; font-size: 14px; }
        .value { color: #e0dcc8; font-size: 14px; font-weight: 500; }
        .btn {
            display: block;
            background: #c5a83d;
            color: #1a1f16;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
            text-decoration: none;
            text-align: center;
        }
        .btn-secondary {
            background: #3a4030;
            color: #e0dcc8;
        }
        .btn:active { transform: scale(0.97); }
        .tg-user { 
            background: #2a3a2a; 
            padding: 8px 16px; 
            border-radius: 20px;
            font-size: 12px;
            color: #8a8672;
            margin-bottom: 16px;
            display: inline-block;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="avatar">👤</div>
    
    <div id="telegram-user" class="tg-user">🔹 Telegram</div>
    
    <h1 id="username">{{ user.username }}</h1>
    <div class="role" id="role">{{ user.role }}</div>
    
    <div class="info">
        <div class="info-item">
            <span class="label">📧 Email</span>
            <span class="value" id="email">{{ user.email }}</span>
        </div>
        <div class="info-item">
            <span class="label">🆔 ID</span>
            <span class="value" id="user-id">{{ user.id }}</span>
        </div>
        <div class="info-item">
            <span class="label">📅 Дата регистрации</span>
            <span class="value" id="created">{{ user.created_at.strftime('%d.%m.%Y') if user.created_at else '—' }}</span>
        </div>
    </div>
    
    <a href="/profile" class="btn">👤 Профиль</a>
    {% if user.role == 'admin' %}
        <a href="/admin" class="btn btn-secondary" style="margin-top:10px;">⚙️ Админ-панель</a>
    {% endif %}
    <a href="/logout" class="btn btn-secondary" style="margin-top:10px;">🚪 Выйти</a>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // Показываем данные пользователя из Telegram
    const user = tg.initDataUnsafe?.user;
    if (user) {
        document.getElementById('telegram-user').textContent = `✅ Telegram: @${user.username || user.first_name}`;
        document.getElementById('username').textContent = user.first_name || user.username || 'Гость';
    }
</script>
</body>
</html>
