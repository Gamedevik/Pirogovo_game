<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хроники Пирогово</title>
    
    <!-- Подключаем Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1f16;
            color: #e0dcc8;
            padding: 16px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 20px;
            color: #c5a83d;
        }
        
        .user-info {
            background: #252b1f;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .resources {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #252b1f;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .resource {
            text-align: center;
            font-size: 14px;
        }
        
        .resource .value {
            font-size: 18px;
            font-weight: bold;
            color: #c5a83d;
        }
        
        .buildings {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .building-card {
            background: #252b1f;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #3a4030;
            text-align: center;
        }
        
        .building-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .building-card .level {
            font-size: 12px;
            color: #8a8672;
            margin-bottom: 8px;
        }
        
        .btn {
            background: #c5a83d;
            color: #1a1f16;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .bottom-nav {
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            background: #252b1f;
            padding: 12px;
            border-radius: 12px;
        }
        
        .bottom-nav a {
            color: #8a8672;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
        }
        
        .bottom-nav a.active {
            color: #c5a83d;
            background: #1a1f16;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🏰 Пирогово</h1>
        <div class="user-info">👤 {{ user.username }}</div>
    </div>
    
    <div class="resources">
        <div class="resource">
            <div>🌲</div>
            <div class="value" id="wood">{{ village.wood }}</div>
        </div>
        <div class="resource">
            <div>🌾</div>
            <div class="value" id="food">{{ village.food }}</div>
        </div>
        <div class="resource">
            <div>💰</div>
            <div class="value" id="gold">{{ village.gold }}</div>
        </div>
        <div class="resource">
            <div>👨‍🌾</div>
            <div class="value" id="population">{{ village.population }}</div>
        </div>
    </div>
    
    <div class="buildings">
        <div class="building-card">
            <h3>🌾 Ферма</h3>
            <div class="level">Уровень 1</div>
            <button class="btn" onclick="build('farm')">Построить</button>
        </div>
        <div class="building-card">
            <h3>🪵 Лесопилка</h3>
            <div class="level">Уровень 1</div>
            <button class="btn" onclick="build('lumbermill')">Построить</button>
        </div>
        <div class="building-card">
            <h3>⛏️ Шахта</h3>
            <div class="level">Уровень 1</div>
            <button class="btn" onclick="build('mine')">Построить</button>
        </div>
        <div class="building-card">
            <h3>🏛️ Казармы</h3>
            <div class="level">Уровень 1</div>
            <button class="btn" onclick="build('barracks')">Построить</button>
        </div>
    </div>
    
    <div class="bottom-nav">
        <a href="/game" class="active">🏠 Домой</a>
        <a href="/map">🗺️ Карта</a>
        <a href="/profile">👤 Профиль</a>
    </div>
</div>

<script>
// Инициализация Telegram WebApp
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand(); // Раскрываем на весь экран

// Функция строительства
async function build(type) {
    try {
        const response = await fetch(`/game/build/${type}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        });
        const data = await response.json();
        
        if (response.ok) {
            tg.showAlert('✅ ' + data.message);
            // Обновляем ресурсы
            location.reload();
        } else {
            tg.showAlert('❌ ' + data.detail);
        }
    } catch (error) {
        tg.showAlert('❌ Ошибка соединения');
    }
}

// Получаем данные пользователя из Telegram
const user = tg.initDataUnsafe?.user;
if (user) {
    console.log('Пользователь Telegram:', user.username);
}
</script>
</body>
</html>
